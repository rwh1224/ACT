<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACT 사례개념화 기록 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-[#F8F9FA]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const FormSection = ({ title, description, icon, children, isHeader = false }) => (
            <div className={`p-6 md:p-8 border-b border-zinc-100 last:border-0 ${isHeader ? 'bg-zinc-50/80' : 'hover:bg-zinc-50/50'} transition-colors`}>
                <div className="flex flex-col md:flex-row gap-4">
                    <div className={`flex-shrink-0 w-12 h-12 ${isHeader ? 'bg-indigo-100 text-indigo-600' : 'bg-emerald-100 text-emerald-600'} rounded-2xl flex items-center justify-center`}>
                        <i data-lucide={icon} className="w-6 h-6"></i>
                    </div>
                    <div className="flex-1 space-y-3">
                        <div>
                            <h3 className={`font-bold ${isHeader ? 'text-xl text-indigo-900' : 'text-lg text-zinc-900'}`}>{title}</h3>
                            {description && <p className="text-sm text-zinc-500">{description}</p>}
                        </div>
                        {children}
                    </div>
                </div>
            </div>
        );

        function App() {
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [formData, setFormData] = useState({
                problem: '', 
                present: '', self: '', acceptance: '', 
                defusion: '', values: '', committedAction: ''
            });

            useEffect(() => { lucide.createIcons(); }, []);

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz15r_QeYja6TXosSPnDLi1ruafymC0E86oqlLVG9VecWvqnOfL4OwNlahLlykIJY0ixA/exec";

                try {
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    alert('성공적으로 기록되었습니다!');
                } catch (err) {
                    alert('오류가 발생했습니다.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-10 px-6 py-4">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <span className="p-2 bg-emerald-600 rounded-lg text-white"><i data-lucide="clipboard-list" className="w-5 h-5"></i></span>
                                ACT 사례개념화 기록
                            </h1>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-8 px-4">
                        <form onSubmit={handleSubmit} className="bg-white rounded-[2rem] border border-zinc-200 shadow-sm overflow-hidden">
                            
                            <FormSection icon="message-square" title="I. 주 호소문제" description="내담자가 호소하는 핵심 문제와 고통">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[120px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.problem} onChange={(e) => handleChange('problem', e.target.value)} />
                            </FormSection>

                            <FormSection icon="activity" title="II. <심리적 유연성 요인>" isHeader={true} />

                            <FormSection icon="clock" title="1. 현존(걱정-반추)" description="현재 순간에 머무르기 vs 과거/미래에 대한 몰입">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.present} onChange={(e) => handleChange('present', e.target.value)} />
                            </FormSection>

                            <FormSection icon="user" title="2. 맥락적 자기(개념적 자기)" description="관찰하는 자기 vs 자기에 대한 정의/평가에 고착">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.self} onChange={(e) => handleChange('self', e.target.value)} />
                            </FormSection>

                            <FormSection icon="heart" title="3. 수용(경험회피)" description="개방적인 태도 vs 고통스러운 경험으로부터 도망">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.acceptance} onChange={(e) => handleChange('acceptance', e.target.value)} />
                            </FormSection>

                            <FormSection icon="brain" title="4. 탈융합(융합된 사고)" description="생각을 관찰하기 vs 생각에 휩쓸려 진실로 믿음">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.defusion} onChange={(e) => handleChange('defusion', e.target.value)} />
                            </FormSection>

                            <FormSection icon="compass" title="5. 가치(비가치)" description="삶의 의미 있는 방향성 vs 가치 상실 또는 타인의 기대">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.values} onChange={(e) => handleChange('values', e.target.value)} />
                            </FormSection>

                            <FormSection icon="zap" title="6. 전념행동(비전념행동)" description="가치를 향한 행동 실행 vs 회피적/충동적 행동">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.committedAction} onChange={(e) => handleChange('committedAction', e.target.value)} />
                            </FormSection>

                            <div className="p-8 bg-zinc-50 border-t flex justify-end">
                                <button type="submit" disabled={isSubmitting} className="bg-emerald-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all shadow-lg active:scale-95 disabled:opacity-50">
                                    {isSubmitting ? '저장 중...' : '스프레드시트에 기록하기'}
                                </button>
                            </div>
                        </form>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
