<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACT 사례개념화 기록 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-[#F8F9FA]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 개별 입력 섹션 컴포넌트
        const FormSection = ({ title, description, icon, children }) => (
            <div className="p-6 md:p-8 border-b border-zinc-100 last:border-0 hover:bg-zinc-50/50 transition-colors">
                <div className="flex flex-col md:flex-row gap-4">
                    <div className="flex-shrink-0 w-12 h-12 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center">
                        <i data-lucide={icon} className="w-6 h-6"></i>
                    </div>
                    <div className="flex-1 space-y-3">
                        <div>
                            <h3 className="text-lg font-bold text-zinc-900">{title}</h3>
                            <p className="text-sm text-zinc-500">{description}</p>
                        </div>
                        {children}
                    </div>
                </div>
            </div>
        );

        function App() {
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [formData, setFormData] = useState({
                problem: '', avoidance: '', motivation: '', barriers: '',
                inflexibility: '', techniques: '', strengths: '', plan: '',
                behaviors: { suicidal: false, internal: false, external: false, situational: false, inSession: false, details: '' }
            });

            useEffect(() => { lucide.createIcons(); }, []);

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
            };

            const handleBehaviorChange = (key, checked) => {
                setFormData(prev => ({
                    ...prev,
                    behaviors: { ...prev.behaviors, [key]: checked }
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                
                // ⚠️ 여기에 본인의 Apps Script 웹 앱 URL을 넣으세요.
                const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz15r_QeYja6TXosSPnDLi1ruafymC0E86oqlLVG9VecWvqnOfL4OwNlahLlykIJY0ixA/exec";

                try {
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    alert('성공적으로 기록되었습니다!');
                } catch (err) {
                    alert('오류가 발생했습니다.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-10 px-6 py-4">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <span className="p-2 bg-emerald-600 rounded-lg text-white"><i data-lucide="clipboard-list" className="w-5 h-5"></i></span>
                                ACT 사례개념화
                            </h1>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-8 px-4">
                        <form onSubmit={handleSubmit} className="bg-white rounded-[2rem] border border-zinc-200 shadow-sm overflow-hidden">
                            
                            <FormSection icon="file-text" title="1. 내담자가 호소한 문제" description="주관적 고통과 치료 방문 이유">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.problem} onChange={(e) => handleChange('problem', e.target.value)} />
                            </FormSection>

                            <FormSection icon="target" title="2. 회피하려는 경험" description="주요 생각, 감정, 기억, 감각, 상황 등">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.avoidance} onChange={(e) => handleChange('avoidance', e.target.value)} />
                            </FormSection>

                            <FormSection icon="zap" title="3. 경험 회피 행동" description="경험을 통제하거나 회피하기 위해 하는 행동">
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">
                                    {[
                                        {id: 'suicidal', label: '자살충동'}, {id: 'internal', label: '내적통제'},
                                        {id: 'external', label: '외적통제'}, {id: 'situational', label: '상황특정적 통제'},
                                        {id: 'inSession', label: '회기 내 통제'}
                                    ].map(item => (
                                        <label key={item.id} className="flex items-center gap-2 p-3 bg-zinc-50 rounded-xl cursor-pointer hover:bg-zinc-100">
                                            <input type="checkbox" checked={formData.behaviors[item.id]} onChange={(e) => handleBehaviorChange(item.id, e.target.checked)} className="accent-emerald-600" />
                                            <span className="text-sm font-medium text-zinc-700">{item.label}</span>
                                        </label>
                                    ))}
                                </div>
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[80px] outline-none focus:ring-2 focus:ring-emerald-500/20 placeholder:text-zinc-400" 
                                    placeholder="구체적인 행동 양상 기술..." value={formData.behaviors.details} onChange={(e) => handleBehaviorChange('details', e.target.value)} />
                            </FormSection>

                            <FormSection icon="plus-circle" title="4. 관련된 동기요인" description="행동의 대가, 가치, 변화의 유익 등">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.motivation} onChange={(e) => handleChange('motivation', e.target.value)} />
                            </FormSection>

                            <FormSection icon="users" title="5. 환경적 장애물" description="사회환경, 재정, 변화의 대가 등">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.barriers} onChange={(e) => handleChange('barriers', e.target.value)} />
                            </FormSection>

                            <FormSection icon="brain-circuit" title="6. 심리적 경직성 기여 요인" description="경직성을 유지시키는 패턴">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.inflexibility} onChange={(e) => handleChange('inflexibility', e.target.value)} />
                            </FormSection>

                            <FormSection icon="layout-dashboard" title="7. 강조할 ACT 과정 및 기법" description="중점적으로 다룰 핵심 프로세스">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.techniques} onChange={(e) => handleChange('techniques', e.target.value)} />
                            </FormSection>

                            <FormSection icon="zap" title="8. 내담자의 강점" description="치료의 자원이 되는 긍정적 요소">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.strengths} onChange={(e) => handleChange('strengths', e.target.value)} />
                            </FormSection>

                            <FormSection icon="target" title="9. ACT 초기 계획" description="초기 회기의 구체적인 목표와 방향">
                                <textarea className="w-full p-4 bg-zinc-50 border rounded-2xl min-h-[100px] outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                    value={formData.plan} onChange={(e) => handleChange('plan', e.target.value)} />
                            </FormSection>

                            <div className="p-8 bg-zinc-50 border-t flex justify-end">
                                <button type="submit" disabled={isSubmitting} className="bg-emerald-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all shadow-lg active:scale-95 disabled:opacity-50">
                                    {isSubmitting ? '저장 중...' : '스프레드시트에 기록하기'}
                                </button>
                            </div>
                        </form>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
