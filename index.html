<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACT мӮ¬лЎҖк°ңл…җнҷ” лҸ„кө¬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #F8F9FA; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        // м•„мқҙмҪҳ м»ҙнҸ¬л„ҢнҠё лһҳнҚј
        const Icon = ({ name, className }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <i data-lucide={name} className={className}></i> : null;
        };

        function App() {
            const [formData, setFormData] = useState({
                problem: '', avoidance: '', motivation: '', barriers: '',
                inflexibility: '', techniques: '', strengths: '', plan: '',
                behaviors: { suicidal: false, internal: false, external: false, details: '' }
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [status, setStatus] = useState({ type: null, message: '' });

            // вҡ пёҸ м—¬кё°м—җ ліёмқёмқҳ Google Apps Script мӣ№ м•ұ URLмқ„ л„Јмңјм„ёмҡ”.
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby1hmy5g-39h0HVEynvBPelE55rn85NvVtSJKeeftlYoSLojAN-oMshx7DJn4aJNmxmyA/exec";

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                
                // лҚ°мқҙн„° м •м ң (м•ұмҠӨ мҠӨнҒ¬лҰҪнҠё м „мҶЎмҡ©)
                const payload = {
                    timestamp: new Date().toLocaleString(),
                    ...formData,
                    behaviorList: Object.entries(formData.behaviors)
                        .filter(([k, v]) => v === true).map(([k]) => k).join(', ')
                };

                try {
                    // GitHub Pagesм—җм„ң м§Ғм ‘ Google ScriptлЎң м „мҶЎ
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors', // CORS м •мұ… мҡ°нҡҢ (мқ‘лӢө нҷ•мқёмқҖ м ңн•ңлҗЁ)
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    setStatus({ type: 'success', message: 'лҚ°мқҙн„°к°Җ м „мҶЎлҗҳм—ҲмҠөлӢҲлӢӨ! (мӢңнҠёлҘј нҷ•мқён•ҳм„ёмҡ”)' });
                    setFormData({ /* мҙҲкё°нҷ” лЎңм§Ғ */ });
                } catch (err) {
                    setStatus({ type: 'error', message: 'мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.' });
                } finally {
                    setIsSubmitting(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Header & Main UI (м ңкіөн•ҙмЈјмӢ  л””мһҗмқё кё°л°ҳ) */}
                    <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-zinc-200 px-6 py-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-600 p-2 rounded-lg text-white">
                                    <Icon name="ClipboardList" />
                                </div>
                                <h1 className="text-xl font-bold text-zinc-900">ACT мӮ¬лЎҖк°ңл…җнҷ”</h1>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-6 py-12">
                        {/* нҸј л°Ҹ м„№м…ҳ кө¬м„ұ (м ңкіөн•ҙмЈјмӢ  React кө¬мЎ° к·ёлҢҖлЎң кө¬нҳ„) */}
                        <form onSubmit={handleSubmit} className="space-y-8">
                            <div className="bg-white rounded-[2rem] border border-zinc-200 shadow-sm overflow-hidden">
                                <section className="p-8 border-b border-zinc-100">
                                    <h3 className="text-lg font-bold mb-2 flex items-center gap-2">
                                        <Icon name="FileText" className="text-emerald-600" /> 1. нҳёмҶҢ л¬ём ң
                                    </h3>
                                    <textarea 
                                        className="w-full p-4 bg-zinc-50 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20"
                                        rows="4"
                                        onChange={(e) => setFormData({...formData, problem: e.target.value})}
                                    ></textarea>
                                </section>
                                
                                {/* ... м¶”к°Җ м„№м…ҳл“Ө ... */}

                                <div className="p-8 bg-zinc-50 flex justify-end">
                                    <button 
                                        type="submit"
                                        className="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all"
                                        disabled={isSubmitting}
                                    >
                                        {isSubmitting ? 'м „мҶЎ мӨ‘...' : 'кё°лЎқн•ҳкё°'}
                                    </button>
                                </div>
                            </div>
                        </form>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
